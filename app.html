<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <script src="axios.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>Application for API</title>
</head>

<body>
    <div class='app'>
        <p class='appMessage'>Area for login</p>
        <p class='loginMsg'>You are not logged in.</p>
        <input class='appInput' type="text" id="urlField" placeholder="Enter Api url"><input class='appInput' type="text"
            id="loginField" placeholder=" Enter username"><input class='appInput' type="password" id="passwordField" placeholder="Enter password">
        <button class='appButton' id='login'>Login</button>
        <div class='separator'></div>
        <p class='appMessage'>Area for your request body</p>
        <textarea id='requestField' cols='80' rows='5' class='textArea' placeholder='Request body in JSON format... Like : { "name" : "John" , "lastName" : "Doe" }'></textarea>
        <input class='appInput' type="text" id="apiField" placeholder="/api/meta/module">
        <div class='separator'></div>
        <p class='appMessage'>Area for your javascript code</p>
        <textarea id='JsCodeField' cols='80' rows='5' class='textArea' placeholder='Enter here your JS code. This code will be added to the callback function from server response. Something like: function (respounce) {YOUR CODE HERE =>}. If you want to somehow change the output, you can reassign the "review" variable right in this field, something like: review = JSON.stringify (response, null, 2);'></textarea>
        <div class='separator'></div>
        <p class='appMessage'>The field for confirming the request and for displaying the answer</p>
        <button class='appButton' id='submit'>Submit</button> <span class='appStatus'></span>
        <textarea id='respounceView' cols='80' rows='20' class='textArea' placeholder="Respounce from server will be here =>" readonly></textarea>
    </div>
    <script src="app.js"></script>
</body>

</html>
